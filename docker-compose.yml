services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DATABASE_PATH: /data/db.sqlite3
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      # Default: Keycloak on the host machine (outside Compose).
      # When using the bundled Keycloak profile, set KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://host.docker.internal:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-awf}
      OIDC_RP_CLIENT_ID: ${OIDC_RP_CLIENT_ID:-awf-web}
      OIDC_RP_CLIENT_SECRET: ${OIDC_RP_CLIENT_SECRET:-awf-web-secret}
    volumes:
      - .:/app
      - app-data:/data
      - web-venv:/app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["runserver"]

  keycloak-db:
    profiles: ["keycloak"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./docker/keycloak/awf-realm.json:/opt/keycloak/data/import/awf-realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  app-data:
  keycloak-db-data:
  web-venv:
